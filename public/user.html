<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài Khoản | XeDo Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container section page-shell">
      <section class="panel page-hero-panel">
        <div class="panel-head panel-head-wrap">
          <div>
            <p class="eyebrow">Tài khoản</p>
            <h1 id="user-greeting">Xin chào</h1>
          </div>
          <div class="nav-actions">
            <a class="ghost-btn link-btn" href="/">Trang chủ</a>
            <a class="ghost-btn link-btn" href="/cart.html">
              Giỏ hàng
              <span id="cart-count" class="count-badge hidden">0</span>
            </a>
            <button id="notification-toggle" class="ghost-btn link-btn">
              Thông báo
              <span id="notification-count" class="count-badge hidden">0</span>
            </button>
            <button id="logout-btn" class="ghost-btn">Đăng xuất</button>
          </div>
        </div>
        <div id="user-profile" class="dashboard-content"></div>
      </section>

      <section class="account-tabs">
        <button class="tab-btn active" data-tab-target="orders">Đơn hàng đã mua</button>
        <button class="tab-btn" data-tab-target="reviews">Đánh giá đã gửi</button>
        <button class="tab-btn" data-tab-target="warranties">Bảo hành</button>
        <button class="tab-btn" data-tab-target="notifications">Thông báo</button>
      </section>

      <section id="notifications-panel" class="panel tab-panel hidden">
        <div class="panel-head panel-head-inline">
          <h2>Thông báo</h2>
          <button id="mark-all-read" class="ghost-btn small-btn">Đánh dấu đã đọc</button>
        </div>
        <div id="notifications-list" class="stack-list"></div>
      </section>

      <section id="orders-panel" class="panel tab-panel">
        <div class="panel-head">
          <h2>Đơn hàng đã mua</h2>
        </div>
        <div id="user-orders" class="stack-list"></div>
      </section>

      <section id="reviews-panel" class="panel tab-panel hidden">
        <div class="panel-head">
          <h2>Đánh giá đã gửi</h2>
        </div>
        <form id="review-form" class="auth-form compact-form">
          <select name="vehicleId" id="review-vehicle" required></select>
          <input name="rating" type="number" min="1" max="5" placeholder="Số sao 1-5" required />
          <input name="comment" type="text" placeholder="Nội dung đánh giá" required />
          <button type="submit" class="primary-btn">Gửi đánh giá</button>
        </form>
        <div id="user-reviews" class="stack-list"></div>
      </section>

      <section id="warranties-panel" class="panel tab-panel hidden">
        <div class="panel-head">
          <h2>Yêu cầu bảo hành</h2>
        </div>
        <form id="warranty-form" class="auth-form compact-form">
          <select name="itemType" id="warranty-item-type" required>
            <option value="vehicle">Bảo hành xe</option>
            <option value="accessory">Bảo hành phụ kiện</option>
            <option value="service">Bảo hành dịch vụ</option>
          </select>
          <select name="orderId" id="warranty-order-select"></select>
          <select name="vehicleId" id="warranty-vehicle-select"></select>
          <select name="accessoryId" id="warranty-accessory-select" class="hidden"></select>
          <select name="serviceId" id="warranty-service-select" class="hidden"></select>
          <input name="warrantyType" type="text" placeholder="Loại bảo hành (mặc định: standard)" />
          <textarea name="issueDescription" rows="4" placeholder="Mô tả lỗi cần bảo hành" required></textarea>
          <button type="submit" class="primary-btn">Gửi yêu cầu bảo hành</button>
        </form>
        <div id="user-warranties" class="stack-list"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/notification-client.js"></script>
    <script src="/user.js"></script>
  </body>
</html>
