<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Trị | XeDo Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container section page-shell">
      <section class="panel page-hero-panel">
        <div class="panel-head panel-head-wrap">
          <div>
            <p class="eyebrow">Quản trị</p>
            <h1 id="admin-greeting">Xin chào</h1>
          </div>
          <div class="nav-actions">
            <a class="ghost-btn link-btn" href="/">Trang chủ</a>
            <button id="notification-toggle" class="ghost-btn link-btn">
              Thông báo
              <span id="notification-count" class="count-badge hidden">0</span>
            </button>
            <button id="logout-btn" class="ghost-btn">Đăng xuất</button>
          </div>
        </div>
      </section>

      <section class="account-tabs">
        <button class="tab-btn active" data-admin-tab="overview">Tổng quan</button>
        <button class="tab-btn" data-admin-tab="products">Sản phẩm</button>
        <button class="tab-btn" data-admin-tab="people">Khách hàng & Đánh giá</button>
        <button class="tab-btn" data-admin-tab="warranties">Bảo hành</button>
        <button class="tab-btn" data-admin-tab="notifications">Thông báo</button>
      </section>

      <section id="admin-notifications-panel" class="panel tab-panel hidden">
        <div class="panel-head panel-head-inline">
          <h2>Thông báo</h2>
          <button id="mark-all-read-admin" class="ghost-btn small-btn">Đánh dấu đã đọc</button>
        </div>
        <div id="notifications-list-admin" class="stack-list"></div>
      </section>

      <section id="admin-overview-panel" class="panel tab-panel">
        <div class="panel-head">
          <h2>Thông tin tổng</h2>
        </div>
        <div id="admin-stats" class="dashboard-content"></div>
        <div class="panel-head panel-head-spaced">
          <h2>Danh sách xác nhận đơn hàng</h2>
        </div>
        <div id="admin-orders" class="stack-list"></div>
      </section>

      <section id="admin-products-panel" class="tab-panel hidden">
        <div class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Thêm / sửa / xóa sản phẩm</h2>
            </div>
            <form id="vehicle-form" class="auth-form compact-form">
              <input type="hidden" name="id" />
              <input type="hidden" name="currentThumbnail" />
              <input name="name" type="text" placeholder="Tên sản phẩm" required />
              <input name="slug" type="text" placeholder="Slug" required />
              <select name="brand" id="brand-select" required></select>
              <select name="category" id="category-select" required></select>
              <input name="engine" type="text" placeholder="Động cơ" />
              <input name="stock" type="number" min="0" placeholder="Số lượng" required />
              <input name="price" type="number" min="0" placeholder="Giá gốc" required />
              <input name="salePrice" type="number" min="0" placeholder="Giá bán" required />
              <input name="thumbnailFile" type="file" accept="image/*" />
              <div id="thumbnail-preview" class="mini-card hidden"></div>
              <input name="description" type="text" placeholder="Mô tả ngắn" required />
              <label class="check-row">
                <input name="featured" type="checkbox" />
                <span>Sản phẩm nổi bật</span>
              </label>
              <button type="submit" class="primary-btn">Lưu sản phẩm</button>
            </form>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Danh sách sản phẩm</h2>
            </div>
            <div id="admin-vehicles" class="stack-list"></div>
          </div>
        </div>
      </section>

      <section id="admin-people-panel" class="tab-panel hidden">
        <div class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Khách hàng</h2>
            </div>
            <div id="admin-users" class="stack-list"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Đánh giá mới nhất</h2>
            </div>
            <div id="admin-reviews" class="stack-list"></div>
          </div>
        </div>
      </section>

      <section id="admin-warranties-panel" class="panel tab-panel hidden">
        <div class="panel-head">
          <h2>Quản lý bảo hành</h2>
        </div>
        <div id="admin-warranties" class="stack-list"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/notification-client.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
