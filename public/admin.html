<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quan Tri | XeDo Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container section page-shell">
      <section class="panel page-hero-panel">
        <div class="panel-head panel-head-wrap">
          <div>
            <p class="eyebrow">Quan tri</p>
            <h1 id="admin-greeting">Xin chao</h1>
          </div>
          <div class="nav-actions">
            <a class="ghost-btn link-btn" href="/">Trang chu</a>
            <button id="notification-toggle" class="ghost-btn link-btn">
              Thong bao
              <span id="notification-count" class="count-badge hidden">0</span>
            </button>
            <button id="logout-btn" class="ghost-btn">Dang xuat</button>
          </div>
        </div>
      </section>

      <section class="account-tabs">
        <button class="tab-btn active" data-admin-tab="overview">Tong quan</button>
        <button class="tab-btn" data-admin-tab="products">San pham</button>
        <button class="tab-btn" data-admin-tab="people">Khach hang & Review</button>
        <button class="tab-btn" data-admin-tab="warranties">Bao hanh</button>
        <button class="tab-btn" data-admin-tab="notifications">Thong bao</button>
      </section>

      <section id="admin-notifications-panel" class="panel tab-panel hidden">
        <div class="panel-head panel-head-inline">
          <h2>Thong bao</h2>
          <button id="mark-all-read-admin" class="ghost-btn small-btn">Danh dau da doc</button>
        </div>
        <div id="notifications-list-admin" class="stack-list"></div>
      </section>

      <section id="admin-overview-panel" class="panel tab-panel">
        <div class="panel-head">
          <h2>Thong tin tong</h2>
        </div>
        <div id="admin-stats" class="dashboard-content"></div>
        <div class="panel-head panel-head-spaced">
          <h2>Danh sach xac nhan don hang</h2>
        </div>
        <div id="admin-orders" class="stack-list"></div>
      </section>

      <section id="admin-products-panel" class="tab-panel hidden">
        <div class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Them / sua / xoa san pham</h2>
            </div>
            <form id="vehicle-form" class="auth-form compact-form">
              <input type="hidden" name="id" />
              <input type="hidden" name="currentThumbnail" />
              <input name="name" type="text" placeholder="Ten san pham" required />
              <input name="slug" type="text" placeholder="Slug" required />
              <select name="brand" id="brand-select" required></select>
              <select name="category" id="category-select" required></select>
              <input name="engine" type="text" placeholder="Dong co" />
              <input name="stock" type="number" min="0" placeholder="So luong" required />
              <input name="price" type="number" min="0" placeholder="Gia goc" required />
              <input name="salePrice" type="number" min="0" placeholder="Gia ban" required />
              <input name="thumbnailFile" type="file" accept="image/*" />
              <div id="thumbnail-preview" class="mini-card hidden"></div>
              <input name="description" type="text" placeholder="Mo ta ngan" required />
              <label class="check-row">
                <input name="featured" type="checkbox" />
                <span>San pham noi bat</span>
              </label>
              <button type="submit" class="primary-btn">Luu san pham</button>
            </form>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Danh sach san pham</h2>
            </div>
            <div id="admin-vehicles" class="stack-list"></div>
          </div>
        </div>
      </section>

      <section id="admin-people-panel" class="tab-panel hidden">
        <div class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Khach hang</h2>
            </div>
            <div id="admin-users" class="stack-list"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Review moi nhat</h2>
            </div>
            <div id="admin-reviews" class="stack-list"></div>
          </div>
        </div>
      </section>

      <section id="admin-warranties-panel" class="panel tab-panel hidden">
        <div class="panel-head">
          <h2>Quan ly bao hanh</h2>
        </div>
        <div id="admin-warranties" class="stack-list"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/notification-client.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
